version: '3.9'

services:
  anvil:
    container_name: anvil
    networks:
      - backend
    image: anvil
    ports:
      - 2102:2102

  mongo:
    image: mongo:latest
    restart: always
    networks:
      - backend
    container_name: mongo
    volumes:
      - ./data/db:/data/db
    ports:
      - 27000:27017

  mongo-express:
    image: mongo-express
    restart: always
    networks:
      - backend
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: REDACTED_USER
      ME_CONFIG_MONGODB_ADMINPASSWORD: REDACTED_PASSWORD
      ME_CONFIG_MONGODB_URL: mongodb://REDACTED_USER:REDACTED_PASSWORD@mongo:27017/
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=backend"
      # HTTP Routers
      - "traefik.http.routers.mongo-express-rtr.entrypoints=https"
      - "traefik.http.routers.mongo-express-rtr.rule=Host(`mongo.${TRF_DOMAIN}`)"
      - "traefik.http.routers.mongo-express-rtr.tls=true"
      - "traefik.http.routers.mongo-express-rtr.tls.certresolver=leresolver"
      # Services
      - "traefik.http.routers.mongo-express-rtr.service=mongo-express-svc"
      - "traefik.http.services.mongo-express-svc.loadbalancer.server.port=8081"
      
networks:
  frontend:
    name: frontend
    driver: bridge
 
  backend:
    name: backend
    driver: bridge

